<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat</title>
    <link rel="stylesheet" href="/style.css" />
    <!-- npm i socket.io-client -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/script.js" defer></script>
  </head>
  <body>
    <h1>Simple Chat</h1>
    <p>משתמשים מחוברים כרגע: <span id="counter">0</span></p>
    <div
      id="user-setup"
      style="margin-bottom: 20px; padding: 10px; border: 1px solid #ccc"
    >
      <input type="text" id="username" placeholder="שם משתמש" />
      <input type="color" id="userColor" title="בחר צבע" />
      <button type="button" onclick="updateProfile()">שמירה</button>
      <button type="button" onclick="disconnectMe()">התנתקות</button>
    </div>

    <ul id="messages"></ul>

    <form id="form" action="#">
      <input id="input" autocomplete="off" placeholder="Type your message..." />
      <button>Send</button>
    </form>
  </body>
</html>
